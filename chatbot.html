<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aria — AI Support</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #f76ab4;
    --accent-glow: rgba(124,106,247,0.3);
    --text: #e8e8f0;
    --text-muted: #7070a0;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .chat-wrapper {
    width: 100%;
    max-width: 480px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .chat-header {
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .bot-avatar {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 20px var(--accent-glow);
    position: relative;
  }
  .bot-avatar::after {
    content: '';
    position: absolute;
    bottom: -2px; right: -2px;
    width: 10px; height: 10px;
    background: #22c55e;
    border-radius: 50%;
    border: 2px solid var(--surface);
  }
  .bot-info h2 {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
  }
  .bot-info p { font-size: 12px; color: var(--text-muted); }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .message {
    display: flex; gap: 10px;
    animation: msgIn 0.3s ease both;
    max-width: 85%;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .message.user { flex-direction: row-reverse; align-self: flex-end; }
  .message.bot  { align-self: flex-start; }
  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; margin-top: 2px;
  }
  .bot .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .user .msg-avatar { background: var(--surface2); border: 1px solid var(--border); }
  .msg-bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.55;
  }
  .bot .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .user .msg-bubble {
    background: linear-gradient(135deg, #2d2b6b, #1e1b4b);
    border: 1px solid rgba(124,106,247,0.25);
    border-bottom-right-radius: 4px;
    color: #d4d0ff;
  }
  .msg-time {
    font-size: 10px; color: var(--text-muted);
    padding: 0 4px; margin-top: 3px;
  }
  .user .msg-time { text-align: right; }
  .typing-indicator {
    display: flex; gap: 5px; align-items: center;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .typing-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }
  .chat-input-area {
    padding: 12px 14px 16px;
    border-top: 1px solid var(--border);
  }
  .input-row {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 10px 10px 14px;
  }
  .input-row:focus-within {
    border-color: rgba(124,106,247,0.5);
  }
  #userInput {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; resize: none; max-height: 100px; line-height: 1.5;
  }
  #userInput::placeholder { color: var(--text-muted); }
  .send-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .send-btn:hover { transform: scale(1.05); }
  .send-btn svg { width: 16px; height: 16px; fill: white; }
  .input-hint {
    font-size: 11px; color: var(--text-muted);
    text-align: center; margin-top: 6px;
  }
  .input-hint span { color: var(--accent); }
</style>
</head>
<body>
<div class="chat-wrapper">
  <div class="chat-header">
    <div class="bot-avatar">🤖</div>
    <div class="bot-info">
      <h2>Aria — AI Support</h2>
      <p>Always online · Powered by Claude</p>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="chat-input-area">
    <div class="input-row">
      <textarea id="userInput" rows="1"
        placeholder="Type your message..."
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">Connected to <span>Python Backend</span></div>
  </div>
</div>

<script>
  // ⚠️ YOUR SERVER ADDRESS — update if IP changes
 const SERVER = window.location.origin; // dynamic

  let conversationHistory = [];

  window.onload = () => {
    addBotMessage("Hi! 👋 I'm Aria, your AI assistant. How can I help you today?");
  };

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addBotMessage(text) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'message bot';
    div.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div>
        <div class="msg-bubble">${formatText(text)}</div>
        <div class="msg-time">${getTime()}</div>
      </div>`;
    container.appendChild(div);
    scrollBottom();
  }

  function addUserMessage(text) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'message user';
    div.innerHTML = `
      <div class="msg-avatar">👤</div>
      <div>
        <div class="msg-bubble">${escapeHtml(text)}</div>
        <div class="msg-time">${getTime()}</div>
      </div>`;
    container.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'message bot'; div.id = 'typingMsg';
    div.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`;
    container.appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typingMsg');
    if (el) el.remove();
  }

  function formatText(t) {
    return escapeHtml(t)
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function scrollBottom() {
    const c = document.getElementById('chatMessages');
    setTimeout(() => c.scrollTop = c.scrollHeight, 50);
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';

    addUserMessage(text);
    conversationHistory.push({ role: "user", content: text });
    showTyping();

    try {
      const response = await fetch(`${SERVER}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: conversationHistory })
      });

      const data = await response.json();
      const reply = data.reply || "Sorry, I couldn't get a response.";

      removeTyping();
      addBotMessage(reply);
      conversationHistory.push({ role: "assistant", content: reply });

    } catch (err) {
      removeTyping();
      addBotMessage("⚠️ Can't reach the server. Make sure app.py is running in Pydroid.");
      console.error(err);
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }
</script>
</body>
</html>
