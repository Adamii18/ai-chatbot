<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aria — AI Support</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; color: #e8e8f0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
  .wrap { width: 100%; max-width: 480px; height: 100vh; display: flex; flex-direction: column; background: #13131a; border: 1px solid #2a2a3d; }
  .header { padding: 16px 20px; border-bottom: 1px solid #2a2a3d; display: flex; align-items: center; gap: 12px; }
  .avatar { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #7c6af7, #f76ab4); display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .info h2 { font-size: 15px; font-weight: 700; }
  .info p { font-size: 12px; color: #7070a0; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .bot-msg, .user-msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
  .bot-msg { background: #1c1c27; border: 1px solid #2a2a3d; align-self: flex-start; border-bottom-left-radius: 4px; }
  .user-msg { background: #2d2b6b; border: 1px solid rgba(124,106,247,0.3); align-self: flex-end; border-bottom-right-radius: 4px; color: #d4d0ff; }
  .input-area { padding: 12px 14px 16px; border-top: 1px solid #2a2a3d; }
  .input-row { display: flex; gap: 10px; background: #1c1c27; border: 1px solid #2a2a3d; border-radius: 14px; padding: 10px 10px 10px 14px; }
  textarea { flex: 1; background: transparent; border: none; outline: none; color: #e8e8f0; font-size: 14px; resize: none; font-family: sans-serif; }
  button { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #7c6af7, #f76ab4); border: none; cursor: pointer; color: white; font-size: 16px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="avatar">🤖</div>
    <div class="info">
      <h2>Aria — AI Support</h2>
      <p>Always online · Powered by Groq AI</p>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="bot-msg">Hi! I'm Aria, your AI assistant. How can I help you today?</div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Type your message..."></textarea>
      <button id="sendBtn">➤</button>
    </div>
  </div>
</div>
<script>
var chatHistory = [];

document.getElementById('sendBtn').addEventListener('click', function() {
  sendMessage();
});

document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function sendMessage() {
  var input = document.getElementById('input');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';

  addMsg(text, 'user-msg');
  chatHistory.push({ role: "user", content: text });

  var typing = addMsg('...', 'bot-msg');

  fetch('/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: chatHistory })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var reply = data.reply || data.error || "No response";
    typing.textContent = reply;
    chatHistory.push({ role: "assistant", content: reply });
  })
  .catch(function(err) {
    typing.textContent = "Error: " + err.message;
  });
}

function addMsg(text, cls) {
  var div = document.createElement('div');
  div.className = cls;
  div.textContent = text;
  var msgs = document.getElementById('messages');
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}
</script>
</body>
</html>
